<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Explore Fizz | fizz5</title>
    <link rel="shortcut icon" href="/images/favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="/images/webclip.png" />
  </head>
  <body data-barba="wrapper" class="z-scroll-page">
    <div id="main" data-barba="container" data-barba-namespace="explore">
      <div id="cms-data" hidden aria-hidden="true"></div>

      <!-- #zs-water-base + #zs-water-backdrop injected at runtime by zScroll.ts -->
      <div class="page-embed">
        <div id="zs-cursor"></div>
        <div id="zs-cursor-ring"></div>

        <div id="zs-scroll-hint">
          <div class="zs-scroll-hint-text">Scroll</div>
          <div class="zs-scroll-hint-line"></div>
        </div>

        <div
          id="zs-fact-title"
          role="button"
          tabindex="0"
          aria-label="Open focused card details"
        >
          <div id="zs-fact-title-text"></div>
        </div>

        <div id="zs-scroll-track"></div>

        <div id="zs-scene-container">
          <div id="zs-scene"></div>
        </div>

        <div id="zs-end-screen">
          <div class="zs-end-text">
            <h2>That's a wrap.</h2>
            <p>Scroll back up to explore — or jump straight to the shop.</p>
            <a href="/shop.html" class="zs-end-cta" data-transition>
              <span class="zs-end-cta-text">Shop Fizz</span>
              <span class="zs-end-cta-arrow" aria-hidden="true">→</span>
            </a>
          </div>
        </div>

        <div id="zs-empty-state">
          <p>Add Product Facts in Webflow CMS to populate this experience.</p>
        </div>

        <div id="zs-card-backdrop" aria-hidden="true"></div>
        <div id="zs-card-overlay" aria-hidden="true"></div>
      </div>
    </div>

    <div id="lottie-overlay" aria-hidden="true">
      <div id="lottie-overlay-canvas"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
