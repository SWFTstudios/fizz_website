<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shop Fizz | fizz5</title>
    <link rel="shortcut icon" href="/images/favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="/images/webclip.png" />
  </head>
  <body data-barba="wrapper" class="shop-page">
    <div id="main" data-barba="container" data-barba-namespace="shop">
      <main class="shop-main">
        <header class="shop-header">
          <nav class="shop-nav" aria-label="Site">
            <a href="/" class="shop-nav-link fizz-label">Home</a>
            <a href="/explore.html" class="shop-nav-link fizz-label">Explore</a>
          </nav>
        </header>

        <div class="shop-hero">
          <p class="shop-eyebrow fizz-eyebrow">Fizz5</p>
          <h1 class="shop-title fizz-heading">Shop Fizz</h1>
          <p class="shop-lead fizz-lead">
            Portable carbonation, flavor packs, and everything you need to add some fizz to your
            day.
          </p>
        </div>

        <section class="shop-catalog" aria-label="Products">
          <p class="shop-catalog-note fizz-caption">Full catalog launching soon — check back for bottles and flavor packs.</p>
        </section>
      </main>
    </div>

    <div id="lottie-overlay" aria-hidden="true">
      <div id="lottie-overlay-canvas"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
